name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias'
        required: true
        default: 'release'
      password:
        description: 'Keystore password'
        required: true
      validity_days:
        description: 'Validity in days'
        required: false
        default: '10950'
      pat_token:
        description: 'GitHub PAT (used only to save secrets, masked immediately)'
        required: true

jobs:
  keygen:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate unique keystore
        id: gen
        run: |
          ALIAS="${{ github.event.inputs.alias }}"
          PASS="${{ github.event.inputs.password }}"
          DAYS="${{ github.event.inputs.validity_days }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          STORE_NAME="keystore_${TIMESTAMP}.jks"

          keytool -genkeypair \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity $DAYS \
            -storepass "$PASS" \
            -keypass "$PASS" \
            -dname "CN=Android Debug, O=Android, C=US" \
            -storetype JKS \
            -keystore "$STORE_NAME"

          B64=$(base64 -w0 "$STORE_NAME")
          echo "keystore_b64=$B64"   >> $GITHUB_OUTPUT
          echo "store_name=$STORE_NAME" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS"        >> $GITHUB_OUTPUT
          echo "Generated: $STORE_NAME"

      - name: Save all secrets to GitHub via API
        env:
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
        run: |
          # Mask the PAT immediately so it never appears in logs
          GH_TOKEN="${{ github.event.inputs.pat_token }}"
          echo "::add-mask::$GH_TOKEN"

          PASS="${{ github.event.inputs.password }}"
          ALIAS="${{ github.event.inputs.alias }}"
          B64="${{ steps.gen.outputs.keystore_b64 }}"
          STORE="${{ steps.gen.outputs.store_name }}"

          set_secret() {
            local name="$1" value="$2"
            # Get repo public key for encryption
            KEY_JSON=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/actions/secrets/public-key")
            KEY_ID=$(echo "$KEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
            PUB_KEY=$(echo "$KEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

            # Encrypt with libsodium (PyNaCl) — correct sealed-box format GitHub expects
            pip install pynacl -q
            ENCRYPTED=$(python3 - <<PYEOF
import sys, base64, json
from nacl import encoding, public

pub_key = base64.b64decode("$PUB_KEY")
sealed = public.SealedBox(public.PublicKey(pub_key)).encrypt(
    "$value".encode("utf-8"))
print(base64.b64encode(sealed).decode("utf-8"))
PYEOF
)
            curl -sf -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/actions/secrets/$name" \
              -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}"
            echo "Secret $name saved ✓"
          }

          set_secret "PAT_TOKEN"     "$GH_TOKEN"
          set_secret "KEYSTORE_B64"  "$B64"
          set_secret "KEYSTORE_PASS" "$PASS"
          set_secret "KEYSTORE_ALIAS" "$ALIAS"
          set_secret "KEYSTORE_FILE"  "$STORE"

      - name: Save keystore name to repository variable
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
        run: |
          STORE="${{ steps.gen.outputs.store_name }}"
          # Try update first, fall back to create
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/actions/variables/KEYSTORE_FILENAME" \
            -d "{\"value\":\"$STORE\"}")
          if [ "$CODE" != "204" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/actions/variables" \
              -d "{\"name\":\"KEYSTORE_FILENAME\",\"value\":\"$STORE\"}"
          fi
          echo "Variable KEYSTORE_FILENAME=$STORE saved ✓"

      - name: Summary
        run: |
          echo "## ✅ Keystore Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Filename | ${{ steps.gen.outputs.store_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Alias | ${{ steps.gen.outputs.alias }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets saved | PAT_TOKEN, KEYSTORE_B64, KEYSTORE_PASS, KEYSTORE_ALIAS, KEYSTORE_FILE |" >> $GITHUB_STEP_SUMMARY
          echo "| Variable saved | KEYSTORE_FILENAME |" >> $GITHUB_STEP_SUMMARY